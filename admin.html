<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>접수 관리 — 대한변협법률구조재단</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:#FAFAF8;color:#1A1A1A;-webkit-font-smoothing:antialiased;}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(160deg,#1B3A2D 0%,#2D6A4F 100%);}
.login-box{background:#fff;border-radius:8px;padding:48px 40px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.2);text-align:center;}
.login-logo{margin-bottom:28px;}
.login-logo img{height:44px;object-fit:contain;}
.login-title{font-family:'Noto Serif KR',serif;font-size:18px;font-weight:700;color:#1B3A2D;margin-bottom:6px;}
.login-desc{font-size:12px;color:#999;margin-bottom:28px;}
.login-input{width:100%;border:1px solid #CCC;border-radius:4px;padding:13px 15px;font-family:inherit;font-size:14px;outline:none;text-align:center;letter-spacing:4px;margin-bottom:12px;}
.login-input:focus{border-color:#1B3A2D;box-shadow:0 0 0 2px rgba(27,58,45,.08);}
.login-btn{width:100%;background:#1B3A2D;color:#fff;border:none;border-radius:4px;padding:13px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;}
.login-btn:hover{background:#2D6A4F;}
.login-err{font-size:12px;color:#C0392B;margin-top:8px;display:none;}
.admin-wrap{display:none;}
.header{background:#1B3A2D;height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 40px;position:sticky;top:0;z-index:100;}
.header img{height:36px;filter:brightness(0) invert(1);opacity:.92;}
.header-right{display:flex;align-items:center;gap:16px;}
.header-right span{font-size:13px;color:rgba(255,255,255,.7);}
.logout-btn{background:rgba(255,255,255,.15);border:none;color:#fff;font-family:inherit;font-size:12px;font-weight:600;padding:7px 14px;border-radius:4px;cursor:pointer;}
.logout-btn:hover{background:rgba(255,255,255,.25);}
.dash{display:grid;grid-template-columns:200px 1fr;min-height:calc(100vh - 64px);}
.sb{background:#fff;border-right:1px solid #E0E0DA;padding:24px 0;}
.sb-sec{margin-bottom:24px;}
.sb-lbl{font-size:10px;font-weight:700;color:#BBB;letter-spacing:1px;padding:0 20px;margin-bottom:6px;}
.sb-item{display:flex;align-items:center;gap:8px;padding:9px 20px;font-size:13px;color:#555;cursor:pointer;border:none;background:none;font-family:inherit;width:100%;text-align:left;transition:all .15s;}
.sb-item:hover{background:#F5F5F0;color:#1A1A1A;}
.sb-item.on{background:#F0F5F2;color:#1B3A2D;font-weight:700;border-right:3px solid #1B3A2D;}
.sb-badge{margin-left:auto;background:#C0392B;color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;}
.dm{padding:32px 36px;background:#FAFAF8;overflow-y:auto;}
.dm-hd{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;}
.dm-title{font-family:'Noto Serif KR',serif;font-size:18px;font-weight:700;color:#1A1A1A;}
.dm-date{font-size:12px;color:#999;margin-top:4px;}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;}
.kpi{background:#fff;border:1px solid #E0E0DA;border-radius:3px;padding:18px;position:relative;}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:#1B3A2D;}
.kpi.or::before{background:#C8891A;}.kpi.rd::before{background:#C0392B;}.kpi.bl::before{background:#2563EB;}
.kpi-lbl{font-size:11px;color:#999;margin-bottom:8px;}
.kpi-num{font-size:28px;font-weight:900;color:#1A1A1A;letter-spacing:-1px;line-height:1;}
.kpi-sub{font-size:11px;color:#BBB;margin-top:5px;}
.fbar{background:#fff;border:1px solid #E0E0DA;border-radius:3px;padding:12px 16px;margin-bottom:12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.srch{display:flex;align-items:center;gap:7px;border:1px solid #CCC;border-radius:3px;padding:8px 11px;flex:1;min-width:160px;background:#FAFAF8;}
.srch:focus-within{border-color:#1B3A2D;}
.srch input{border:none;outline:none;font-family:inherit;font-size:13px;width:100%;background:transparent;}
.srch input::placeholder{color:#CCC;}
.fsel{border:1px solid #CCC;border-radius:3px;padding:8px 26px 8px 10px;font-family:inherit;font-size:13px;color:#555;background:#FAFAF8;-webkit-appearance:none;cursor:pointer;}
.fsel:focus{outline:none;border-color:#1B3A2D;}
.tbl-wrap{background:#fff;border:1px solid #E0E0DA;border-radius:3px;overflow:hidden;}
.tbl-hd{padding:13px 18px;border-bottom:1px solid #EBEBEB;display:flex;align-items:center;justify-content:space-between;}
.tbl-hd b{font-size:14px;font-weight:700;}
table{width:100%;border-collapse:collapse;}
th{background:#F5F5F0;padding:10px 13px;font-size:11px;font-weight:700;color:#999;text-align:left;border-bottom:1px solid #EBEBEB;white-space:nowrap;}
td{padding:12px 13px;font-size:13px;color:#333;border-bottom:1px solid #F0F0EB;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#FAFAF8;}
.badge{display:inline-block;padding:2px 9px;border-radius:2px;font-size:11px;font-weight:700;}
.b-접수{background:#EEF4F0;color:#1B3A2D;}
.b-검토중{background:#FEF9EC;color:#8A6D10;}
.b-승인{background:#EEF3FE;color:#2563EB;}
.b-소송진행{background:#F0EEF8;color:#5B21B6;}
.b-완료{background:#F0F0EB;color:#888;}
.b-온라인{background:#EEF4F0;color:#1B3A2D;font-size:10px;}
.b-우편{background:#FEF9EC;color:#8A6D10;font-size:10px;}
.dbar{display:flex;align-items:center;gap:5px;}
.dok{color:#1B3A2D;font-weight:700;font-size:12px;}
.dng{color:#C0392B;font-weight:700;font-size:12px;}
.dmini{width:40px;height:3px;background:#E0E0DA;border-radius:2px;overflow:hidden;}
.dmini-fill{height:100%;background:#1B3A2D;border-radius:2px;}
.av{width:24px;height:24px;border-radius:50%;background:#E8F0EB;color:#1B3A2D;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;}
.lchip{font-size:10px;font-weight:700;padding:2px 7px;border-radius:2px;background:#FEF9EC;color:#8A6D10;}
.btn{padding:10px 20px;border-radius:3px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;border:none;}
.btn-p{background:#1B3A2D;color:#fff;}
.btn-p:hover{background:#2D6A4F;}
.btn-s{background:#fff;color:#555;border:1px solid #CCC;}
.btn-s:hover{background:#F5F5F0;}
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center;}
.mbg.op{display:flex;}
.modal{background:#fff;border-radius:4px;width:100%;max-width:500px;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);}
.m-hd{padding:18px 22px;border-bottom:1px solid #EBEBEB;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;}
.m-hd b{font-size:15px;font-weight:700;}
.m-close{background:#F5F5F0;border:none;border-radius:3px;width:28px;height:28px;cursor:pointer;font-size:14px;color:#999;}
.m-body{padding:22px;}
.mrow{display:flex;gap:8px;margin-bottom:10px;font-size:13px;}
.mkey{color:#999;width:80px;flex-shrink:0;}
.mval{font-weight:600;flex:1;}
.mdiv{height:1px;background:#EBEBEB;margin:14px 0;}
.step-track{display:flex;align-items:flex-start;margin:12px 0;}
.step-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
.step-dot{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;}
.sd-done{background:#E8F0EB;color:#1B3A2D;border:1.5px solid #1B3A2D;}
.sd-on{background:#1B3A2D;color:#fff;}
.sd-idle{background:#F5F5F0;color:#CCC;border:1.5px solid #E0E0DA;}
.step-lbl{font-size:10px;color:#999;text-align:center;}
.step-line{height:1px;flex:1;margin-top:11px;}
.sl-done{background:#1B3A2D;opacity:.25;}
.sl-idle{background:#E0E0DA;}
@media(max-width:800px){.dash{grid-template-columns:1fr;}.sb{display:none;}.kpi-row{grid-template-columns:repeat(2,1fr);}.dm{padding:20px 14px;}.hm{display:none;}}
</style>
</head>

        <div class="kpi bl"><div class="kpi-lbl">소송 진행</div><div class="kpi-num" id="kpi_suit">0</div><div class="kpi-sub">진행 중</div></div>
      </div>
      <div class="fbar">
        <div class="srch"><span style="color:#CCC;">🔍</span><input id="srch_input" placeholder="이름, 주소, 접수번호..."></div>
        <select class="fsel" id="f_st"><option value="">전체 상태</option><option>접수</option><option>검토중</option><option>승인</option><option>소송진행</option><option>완료</option></select>
        <select class="fsel" id="f_tp"><option value="">전체 유형</option><option>형사사건</option><option>소송구조 본안</option><option>신청사건</option></select>
        <select class="fsel" id="f_rv"><option value="">전체 접수</option><option>온라인</option><option>우편</option></select>
      </div>
      <div class="tbl-wrap">
        <div class="tbl-hd"><b>신청 목록</b><span style="font-size:12px;color:#999;" id="tbl_count">0건</span></div>
        <div style="overflow-x:auto;">
          <table>
            <thead><tr>
              <th>접수번호</th><th>이름</th><th>접수</th><th>유형</th>
              <th class="hm">한도</th><th>서류</th><th>상태</th>
              <th class="hm">담당자</th><th>접수일</th><th></th>
            </tr></thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="mbg" id="modal_bg">
  <div class="modal">
    <div class="m-hd"><b id="m_title">상세보기</b><button class="m-close" id="m_close">✕</button></div>
    <div class="m-body" id="m_body"></div>
  </div>
</div>

<script>
var PASS = 'aid6515';
var SL = ['접수','검토중','승인','소송진행','완료'];
var STAFF = ['김민준','이서연','박지훈','최유진','정다은','오승우'];
var dbData = [];

// 이벤트 리스너 방식으로 변경
document.getElementById('login_btn').addEventListener('click', function() {
  var pw = document.getElementById('pw_input').value;
  if (pw === PASS) {
    document.getElementById('loginWrap').style.display = 'none';
    document.getElementById('adminWrap').style.display = 'block';
    sessionStorage.setItem('admin_auth', '1');
    initDash();
  } else {
    document.getElementById('login_err').style.display = 'block';
    document.getElementById('pw_input').value = '';
    document.getElementById('pw_input').focus();
  }
});

document.getElementById('pw_input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') document.getElementById('login_btn').click();
});

document.getElementById('logout_btn').addEventListener('click', function() {
  sessionStorage.removeItem('admin_auth');
  document.getElementById('loginWrap').style.display = 'flex';
  document.getElementById('adminWrap').style.display = 'none';
});

document.getElementById('m_close').addEventListener('click', function() {
  document.getElementById('modal_bg').classList.remove('op');
});

document.getElementById('modal_bg').addEventListener('click', function(e) {
  if (e.target === this) this.classList.remove('op');
});

document.getElementById('srch_input').addEventListener('input', filterTable);
document.getElementById('f_st').addEventListener('change', filterTable);
document.getElementById('f_tp').addEventListener('change', filterTable);
document.getElementById('f_rv').addEventListener('change', filterTable);

// 세션 유지
if (sessionStorage.getItem('admin_auth') === '1') {
  document.getElementById('loginWrap').style.display = 'none';
  document.getElementById('adminWrap').style.display = 'block';
  initDash();
}

function initDash() {
  document.getElementById('dm_date').textContent = new Date().toLocaleDateString('ko-KR', {year:'numeric',month:'long',day:'numeric',weekday:'long'});
  var saved = localStorage.getItem('jeonse_applications');
  if (saved) {
    try { dbData = JSON.parse(saved); } catch(e) { dbData = []; }
  }
  updateKpi();
  filterTable();
}

function updateKpi() {
  document.getElementById('kpi_total').textContent = dbData.length;
  document.getElementById('kpi_review').textContent = dbData.filter(function(d){ return d.status === '검토중'; }).length;
  document.getElementById('kpi_missing').textContent = dbData.filter(function(d){ return d.docs < 6; }).length;
  document.getElementById('kpi_suit').textContent = dbData.filter(function(d){ return d.status === '소송진행'; }).length;
  document.getElementById('sb_total').textContent = dbData.length;
  document.getElementById('tbl_count').textContent = dbData.length + '건';
}

function filterTable() {
  var q = document.getElementById('srch_input').value;
  var st = document.getElementById('f_st').value;
  var tp = document.getElementById('f_tp').value;
  var rv = document.getElementById('f_rv').value;
  var rows = dbData.filter(function(d) {
    return (!q || d.name.includes(q) || d.no.includes(q) || (d.addr||'').includes(q)) &&
           (!st || d.status === st) && (!tp || d.type === tp) && (!rv || d.recv === rv);
  });
  var tbody = document.getElementById('tbody');
  if (rows.length === 0) {
    tbody.innerHTML = '<tr><td colspan="10" style="text-align:center;padding:40px;color:#999;">신청 내역이 없습니다</td></tr>';
    document.getElementById('tbl_count').textContent = '0건';
    return;
  }
  tbody.innerHTML = rows.map(function(d, i) {
    var ok = d.docs >= 6;
    var pct = Math.round(d.docs / d.total * 100);
    var idx = dbData.indexOf(d);
    return '<tr>' +
      '<td style="font-size:11px;color:#999;font-weight:600;">' + d.no + '</td>' +
      '<td style="font-weight:700;">' + d.name + '</td>' +
      '<td><span class="badge b-' + d.recv + '">' + d.recv + '</span></td>' +
      '<td style="font-size:12px;">' + d.type + '</td>' +
      '<td class="hm"><span class="lchip">' + d.limit + '</span></td>' +
      '<td><div class="dbar"><span class="' + (ok?'dok':'dng') + '">' + (ok?'완비':'미비') + '</span><div class="dmini"><div class="dmini-fill" style="width:' + pct + '%;"></div></div></div></td>' +
      '<td><span class="badge b-' + d.status + '">' + d.status + '</span></td>' +
      '<td class="hm"><div style="display:flex;align-items:center;gap:6px;"><div class="av">' + d.staff[0] + '</div><span style="font-size:12px;">' + d.staff + '</span></div></td>' +
      '<td style="font-size:12px;color:#999;">' + d.date + '</td>' +
      '<td><button class="btn btn-s" style="padding:5px 10px;font-size:12px;" data-idx="' + idx + '">상세</button></td>' +
      '</tr>';
  }).join('');
  document.getElementById('tbl_count').textContent = rows.length + '건';

  // 상세 버튼 이벤트
  tbody.querySelectorAll('[data-idx]').forEach(function(btn) {
    btn.addEventListener('click', function() {
      openModal(parseInt(this.getAttribute('data-idx')));
    });
  });
}

function openModal(idx) {
  var d = dbData[idx];
  var ci = SL.indexOf(d.status);
  var track = '<div class="step-track">';
  SL.forEach(function(s, i) {
    var cls = i < ci ? 'sd-done' : (i === ci ? 'sd-on' : 'sd-idle');
    track += '<div class="step-item"><div class="step-dot ' + cls + '">' + (i < ci ? '✓' : i+1) + '</div><div class="step-lbl">' + s + '</div></div>';
    if (i < SL.length-1) track += '<div class="step-line ' + (i < ci ? 'sl-done' : 'sl-idle') + '"></div>';
  });
  track += '</div>';

  var stOpts = SL.map(function(s){ return '<option' + (s===d.status?' selected':'') + '>' + s + '</option>'; }).join('');
  var staffOpts = STAFF.map(function(s){ return '<option' + (s===d.staff?' selected':'') + '>' + s + '</option>'; }).join('');

  document.getElementById('m_title').textContent = d.name + ' 님 신청 상세';
  document.getElementById('m_body').innerHTML =
    track + '<div class="mdiv"></div>' +
    '<div class="mrow"><span class="mkey">접수번호</span><span class="mval" style="color:#1B3A2D;font-size:12px;">' + d.no + '</span></div>' +
    '<div class="mrow"><span class="mkey">접수방법</span><span class="mval"><span class="badge b-' + d.recv + '">' + d.recv + '</span></span></div>' +
    '<div class="mrow"><span class="mkey">이름</span><span class="mval">' + d.name + '</span></div>' +
    '<div class="mrow"><span class="mkey">연락처</span><span class="mval">' + d.phone + '</span></div>' +
    '<div class="mrow"><span class="mkey">주소</span><span class="mval">' + d.addr + '</span></div>' +
    '<div class="mrow"><span class="mkey">지원유형</span><span class="mval">' + d.type + '</span></div>' +
    '<div class="mrow"><span class="mkey">지원한도</span><span class="mval" style="color:#8A6D10;">' + d.limit + '</span></div>' +
    '<div class="mrow"><span class="mkey">보증금</span><span class="mval">' + d.amount + '</span></div>' +
    '<div class="mrow"><span class="mkey">서류</span><span class="mval">' + d.docs + '/' + d.total + ' 완비</span></div>' +
    '<div class="mrow"><span class="mkey">담당자</span><span class="mval">' + d.staff + '</span></div>' +
    '<div class="mrow"><span class="mkey">접수일</span><span class="mval">' + d.date + '</span></div>' +
    '<div class="mdiv"></div>' +
    '<div style="margin-bottom:12px;"><label style="font-size:12px;font-weight:600;color:#333;display:block;margin-bottom:6px;">상태 변경</label>' +
    '<select id="modal_st" style="width:100%;border:1px solid #CCC;border-radius:3px;padding:10px 12px;font-family:inherit;font-size:13px;">' + stOpts + '</select></div>' +
    '<div style="margin-bottom:16px;"><label style="font-size:12px;font-weight:600;color:#333;display:block;margin-bottom:6px;">담당자 배정</label>' +
    '<select id="modal_staff" style="width:100%;border:1px solid #CCC;border-radius:3px;padding:10px 12px;font-family:inherit;font-size:13px;">' + staffOpts + '</select></div>' +
    '<div style="background:#F5F5F0;border-radius:3px;padding:11px 13px;font-size:12px;color:#888;margin-bottom:16px;">📎 우편 서류 도착 시 스캔 후 파일 등록</div>' +
    '<div style="display:flex;gap:10px;">' +
    '<button class="btn btn-s" id="modal_close2">닫기</button>' +
    '<button class="btn btn-p" id="modal_save">💾 저장</button>' +
    '</div>';

  document.getElementById('modal_close2').addEventListener('click', function() {
    document.getElementById('modal_bg').classList.remove('op');
  });
  document.getElementById('modal_save').addEventListener('click', function() {
    dbData[idx].status = document.getElementById('modal_st').value;
    dbData[idx].staff = document.getElementById('modal_staff').value;
    localStorage.setItem('jeonse_applications', JSON.stringify(dbData));
    updateKpi();
    filterTable();
    document.getElementById('modal_bg').classList.remove('op');
    alert('저장되었습니다.');
  });

  document.getElementById('modal_bg').classList.add('op');
}
</script>
</body>
</html>
